name: Validate skills

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate skill metadata and support files
        run: python scripts/validate-skills.py

      - name: Check shell scripts
        run: |
          find skills -path '*/scripts/*.sh' -print0 | xargs -0 -r bash -n

      - name: Check markdown/code whitespace
        run: git diff --check
